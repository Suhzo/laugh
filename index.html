<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웃어라,세상이 너와 함께 웃을 것이다.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;700;900&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:  #0D0D0D;
      --white:  #F5F5EC;   /* polaroid card white */
      --yellow: #FFE500;
      --red:    #FF2222;
      --blue:   #3D6FFF;
      --green:  #00D44B;
      /* dark mode palette */
      --bg:     #111111;
      --fg:     #F0F0E4;
      --border: 3px solid var(--black);      /* polaroid/card borders */
      --border-ui: 3px solid var(--fg);      /* UI borders on dark bg */
      --sh-sm:  3px 3px 0 var(--black);
      --sh-md:  5px 5px 0 var(--black);
      --sh-lg:  8px 8px 0 var(--black);
      --sh-ui-sm: 3px 3px 0 var(--fg);
      --sh-ui-md: 5px 5px 0 var(--fg);
      --sh-ui-lg: 8px 8px 0 var(--fg);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      color: var(--fg);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== CAPTURE SECTION ===== */
    .capture-section {
      position: relative;
      z-index: 9000;
      padding: 56px 20px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .webcam-wrap       { position: relative; z-index: 9010; pointer-events: auto; }
    .capture-controls  { position: relative; z-index: 9010; pointer-events: auto; }
    .meter-wrap        { position: relative; z-index: 9010; pointer-events: auto; }
    #captureBtn        { position: relative; z-index: 9010; pointer-events: auto; }

    .section-heading {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.8rem, 7vw, 5rem);
      letter-spacing: 6px;
      text-align: center;
      line-height: 1;
      margin-bottom: 6px;
    }

    .section-sub {
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      line-height: 1.2;
      opacity: 0.45;
      margin-bottom: 36px;
      text-align: center;
    }

    /* Camera */
    .webcam-wrap {
      position: relative;
      width: min(384px, 100%);
      background: #111;
      overflow: hidden;
    }

    #webcam {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas { display: none; }

    .flash-layer {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.06s;
    }
    .flash-layer.pop { opacity: 1; }

    /* Smile badge */
    .smile-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 5px 12px;
      border: none;
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: var(--red);
      color: #fff;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .smile-badge.on {
      background: var(--green);
      color: var(--black);
    }

    /* Meter */
    .capture-controls {
      width: min(416px, 100%);
      margin-top: 10px;
      padding: 10px 20px 16px;
      background: rgba(18,18,18,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .meter-wrap {
      width: min(384px, 100%);
      margin-top: 0;
    }

    .meter-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .meter-track {
      height: 18px;
      background: #2a2a2a;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--red);
      transition: width 0.08s linear, background 0.15s;
    }
    .meter-fill.on { background: var(--green); }

    /* Capture button */
    #captureBtn {
      margin-top: 18px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #555;
      color: #fff;
      border: none;
      box-shadow: none;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #captureBtn:disabled {
      background: #2a2a2a;
      color: #444;
      cursor: not-allowed;
    }

    #captureBtn svg {
      width: 26px;
      height: 26px;
    }

    /* ===== MODAL ===== */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-bg.open { display: flex; }

    .modal-box {
      background: #1a1a1a;
      border: var(--border-ui);
      box-shadow: none;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    #previewImg {
      width: 100%;
      display: block;
      border: var(--border-ui);
      margin-bottom: 16px;
    }

    #postText {
      width: 100%;
      padding: 14px;
      font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: var(--border-ui);
      box-shadow: none;
      background: #0f0f0f;
      color: var(--fg);
      resize: vertical;
      min-height: 88px;
      outline: none;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    #postText:focus { outline: 3px solid var(--blue); }
    #postText::placeholder { font-weight: 500; opacity: 0.45; }

    .char-row {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      text-align: right;
      margin-bottom: 16px;
    }

    .modal-actions { display: flex; gap: 12px; }

    #shareBtn {
      flex: 1;
      padding: 14px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.6rem;
      letter-spacing: 3px;
      background: #c8c8c8;
      color: #333;
      border: none;
      box-shadow: none;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    #shareBtn:hover:not(:disabled) { background: #b0b0b0; }
    #shareBtn:active:not(:disabled) { background: #a0a0a0; }
    #shareBtn:disabled { opacity: 0.55; cursor: not-allowed; }

    #cancelBtn {
      padding: 14px 18px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.6rem;
      letter-spacing: 3px;
      background: transparent;
      color: var(--fg);
      border: var(--border-ui);
      box-shadow: none;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    #cancelBtn:hover { background: var(--red); color: #fff; }

    /* ===== FEED ===== */
    #pileStage {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      min-height: 100vh;
      padding: 24px 0 28px;
      overflow: visible;
      z-index: 10;
      pointer-events: none;
    }

    .pile-empty {
      display: none;
    }


    /* Card */
    .post-card {
      position: absolute;
      width: min(168px, calc(100vw - 36px));
      background: transparent;
      padding: 0;
      border: none;
      box-shadow: none;
      cursor: grab;
      user-select: none;
      touch-action: none;
      pointer-events: auto;
      overflow: hidden;
      will-change: left, top;
      transition: filter 0.15s ease;
    }
    .post-card.drop-in {
      animation: cardDrop 1.45s cubic-bezier(0.28, 0.04, 0.2, 1) both;
    }
    @keyframes cardDrop {
      0% {
        transform: translateY(var(--drop-distance, -100vh)) rotate(var(--rot));
      }
      100% {
        transform: translateY(0) rotate(var(--rot));
      }
    }

    .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(128,128,128,0.3);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 0;
      transition: background 0.15s;
    }
    .delete-btn:hover { background: rgba(128,128,128,0.5); }

    #pwModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99999;
      align-items: center;
      justify-content: center;
    }
    #pwModal.open { display: flex; }
    #pwModal .pw-box {
      background: #1a1a1a;
      border: 1px solid #444;
      padding: 24px 20px 20px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 240px;
    }
    #pwModal .pw-box.shake {
      animation: pwShake 0.35s ease;
    }
    @keyframes pwShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }
    #pwModal .pw-box p {
      color: #eee;
      font-size: 13px;
      margin: 0;
      text-align: center;
    }
    #pwModal input {
      background: #2a2a2a;
      border: 1px solid #555;
      color: #fff;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }
    #pwModal .pw-actions {
      display: flex;
      gap: 8px;
    }
    #pwModal button {
      flex: 1;
      padding: 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    #pwModal #pwConfirm { background: #e53e3e; color: #fff; }
    #pwModal #pwCancel  { background: #333; color: #aaa; }

    .post-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      filter: grayscale(1) contrast(1.12);
    }

    .post-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.62));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .post-text {
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
      width: 100%;
    }

    .post-meta {
      font-size: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.55);
      margin-top: 3px;
    }

    .feed-loading {
      position: absolute;
      top: 60px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      padding: 64px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.2rem;
      letter-spacing: 3px;
      opacity: 0.28;
    }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #2f2f2f;
      color: #f0f0f0;
      border: 1px solid rgba(109,109,109,0.7);
      box-shadow: none;
      padding: 16px 22px;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.45;
      z-index: 2147483647;
      opacity: 0;
      transition: opacity 0.45s ease;
      width: min(360px, calc(100% - 40px));
      text-align: center;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px) {

      .capture-section { padding: 32px 16px; }
      #captureBtn { width: 58px; height: 58px; }
    }
  </style>
</head>
<body>

<!-- ===== CAPTURE SECTION ===== -->
<section class="capture-section">
  <h1 class="section-heading">Laugh,<br>and the world laughs with you</h1>
  <p class="section-sub">Weep, and you weep alone.<br>— Ella Wheeler Wilcox, "Solitude"</p>

  <div class="webcam-wrap">
    <video id="webcam" autoplay playsinline muted></video>
    <div class="flash-layer" id="flashLayer"></div>
    <div class="smile-badge" id="smileBadge">● NOT SMILING</div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="capture-controls">
    <div class="meter-wrap">
      <div class="meter-row">
        <span>SMILE METER</span>
        <span id="smilePct">0%</span>
      </div>
      <div class="meter-track">
        <div class="meter-fill" id="meterFill"></div>
      </div>
    </div>

    <button id="captureBtn" disabled>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
  </div>
</section>

<section id="pileStage" aria-label="Smile guestbook"></section>

<!-- ===== MODAL ===== -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <p class="modal-title">I like your smile..</p>
    <img id="previewImg" alt="Your captured smile" />
    <textarea
      id="postText"
      placeholder="행복해서 웃는게 아니라 웃어서 행복한거야..."
      maxlength="140"
    ></textarea>
    <p class="char-row"><span id="charLeft">140</span> chars left</p>
    <div class="modal-actions">
      <button id="shareBtn">SHARE</button>
      <button id="cancelBtn">CANCEL</button>
    </div>
  </div>
</div>

<div id="pwModal">
  <div class="pw-box">
    <p>삭제를 원한다면 그녀를 찬양해...</p>
    <input id="pwInput" type="text" placeholder="비밀번호" />
    <div class="pw-actions">
      <button id="pwConfirm">삭제</button>
      <button id="pwCancel">취소</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast"></div>

<!-- ===== SCRIPT ===== -->
<script type="module">
  /* ============================================================
   * CONFIGURATION
   *
   * To enable cross-device sharing via Supabase:
   *   1. Create a Supabase project at https://supabase.com
   *   2. Run this SQL to create the posts table:
   *        create table posts (
   *          id uuid default uuid_generate_v4() primary key,
   *          image_url text not null,
   *          text  text not null,
   *          created_at timestamptz default now()
   *        );
   *        alter table posts enable row level security;
   *        create policy "anyone can read"  on posts for select using (true);
   *        create policy "anyone can write" on posts for insert with check (true);
   *   3. Fill in your Project URL and anon key below.
   *
   * Leave both empty → single-browser mode (localStorage).
   * ============================================================ */
  const SUPABASE_URL      = "https://xlqmvlslsclzxepmsnwe.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1gC9yAHLLszm4C71rSDuZQ_vdgKpv7W";

  /* ============================================================
   * MEDIAPIPE IMPORT (CDN)
   * ============================================================ */
  import { FaceLandmarker, FilesetResolver }
    from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

  /* ============================================================
   * CONSTANTS
   * ============================================================ */
  const SMILE_THRESHOLD = 0.42; // avg of mouthSmileLeft + mouthSmileRight
  const LS_KEY          = "smile_share_v1";
  const MAX_LOCAL       = 50;
  const STORAGE_BUCKET  = "smiles";
  const USE_SUPABASE    = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

  /* ============================================================
   * DOM REFS
   * ============================================================ */
  const webcamEl    = document.getElementById("webcam");
  const canvasEl    = document.getElementById("canvas");
  const captureBtn  = document.getElementById("captureBtn");
  const smileBadge  = document.getElementById("smileBadge");
  const meterFill   = document.getElementById("meterFill");
  const smilePct    = document.getElementById("smilePct");
  const flashLayer  = document.getElementById("flashLayer");
  const modalBg     = document.getElementById("modalBg");
  const previewImg  = document.getElementById("previewImg");
  const postText    = document.getElementById("postText");
  const charLeft    = document.getElementById("charLeft");
  const shareBtn    = document.getElementById("shareBtn");
  const cancelBtn   = document.getElementById("cancelBtn");
  const toastEl     = document.getElementById("toast");
  const pileStage   = document.getElementById("pileStage");
  const pwModal     = document.getElementById("pwModal");
  const pwInput     = document.getElementById("pwInput");
  const pwConfirm   = document.getElementById("pwConfirm");
  const pwCancel    = document.getElementById("pwCancel");
  const pwBox       = document.querySelector("#pwModal .pw-box");

  let pendingCard = null;
  let pendingPost = null;

  function openPwModal(card, post) {
    pendingCard = card;
    pendingPost = post;
    pwInput.value = "";
    pwModal.classList.add("open");
    setTimeout(() => pwInput.focus(), 50);
  }
  function closePwModal() {
    pwModal.classList.remove("open");
    pendingCard = null;
    pendingPost = null;
  }
  function confirmDelete() {
    if (!pendingCard) return;
    if (pwInput.value === "조서현최고") {
      pendingCard.style.transition = "opacity 0.25s";
      pendingCard.style.opacity = "0";
      const c = pendingCard, p = pendingPost;
      setTimeout(() => { c.remove(); layoutPile(); }, 250);
      removeFromStorage(p.id);
      closePwModal();
      showToast("오냐...정성이 갸륵하여 지워주겠도다..");
    } else {
      pwInput.value = "";
      pwInput.placeholder = "다시 해보거라..";
      pwBox.classList.remove("shake");
      void pwBox.offsetWidth;
      pwBox.classList.add("shake");
      pwInput.focus();
    }
  }
  pwConfirm.addEventListener("click", confirmDelete);
  pwCancel.addEventListener("click", closePwModal);
  pwInput.addEventListener("keydown", e => {
    if (e.key === "Enter")  confirmDelete();
    if (e.key === "Escape") closePwModal();
  });

  /* ============================================================
   * STATE
   * ============================================================ */
  let faceLandmarker = null;
  let smileScore     = 0;
  let isSmiling      = false;
  let capturedUrl    = null;
  let lastVideoTime  = -1;
  let toastTimer     = null;
  let sbClient       = null;
  let zCounter       = 1;

  /* Drag state */
  let dragEl = null, dragOX = 0, dragOY = 0;

  /* ============================================================
   * WEBCAM
   * ============================================================ */
  async function startWebcam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }
      });
      webcamEl.srcObject = stream;
      await new Promise(res => { webcamEl.onloadedmetadata = res; });
      webcamEl.play();
      initMediaPipe();
    } catch (e) {
      console.error("Webcam:", e);
    }
  }

  /* ============================================================
   * MEDIAPIPE
   * ============================================================ */
  async function initMediaPipe() {
    try {
      const resolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );
      faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        outputFaceBlendshapes: true,
        runningMode: "VIDEO",
        numFaces: 1
      });
      requestAnimationFrame(detectLoop);
    } catch (e) {
      console.error("MediaPipe:", e);
    }
  }

  /* ============================================================
   * DETECTION LOOP
   * ============================================================ */
  function detectLoop() {
    if (faceLandmarker && !webcamEl.paused && webcamEl.readyState >= 2) {
      const now = performance.now();
      if (webcamEl.currentTime !== lastVideoTime) {
        lastVideoTime = webcamEl.currentTime;
        const result = faceLandmarker.detectForVideo(webcamEl, now);
        processBlendshapes(result);
      }
    }
    requestAnimationFrame(detectLoop);
  }

  function processBlendshapes(result) {
    if (result.faceBlendshapes?.length) {
      const cats = result.faceBlendshapes[0].categories;
      const L = cats.find(c => c.categoryName === "mouthSmileLeft")?.score  ?? 0;
      const R = cats.find(c => c.categoryName === "mouthSmileRight")?.score ?? 0;
      smileScore = (L + R) / 2;
    } else {
      smileScore = 0;
    }
    updateSmileUI();
  }

  function updateSmileUI() {
    const pct = Math.round(smileScore * 100);
    meterFill.style.width = pct + "%";
    smilePct.textContent  = pct + "%";
    isSmiling = smileScore >= SMILE_THRESHOLD;

    if (isSmiling) {
      meterFill.classList.add("on");
      smileBadge.classList.add("on");
      smileBadge.textContent   = "● SMILING!";
      captureBtn.disabled      = false;
    } else {
      meterFill.classList.remove("on");
      smileBadge.classList.remove("on");
      smileBadge.textContent = "● NOT SMILING";
      captureBtn.disabled    = true;
    }
  }

  /* ============================================================
   * CAPTURE
   * ============================================================ */
  captureBtn.addEventListener("click", () => {
    if (!isSmiling) return;

    // Flash
    flashLayer.classList.add("pop");
    setTimeout(() => flashLayer.classList.remove("pop"), 160);

    // Draw to canvas (flip mirror → correct orientation)
    canvasEl.width  = webcamEl.videoWidth;
    canvasEl.height = webcamEl.videoHeight;
    const ctx = canvasEl.getContext("2d");
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(webcamEl, -canvasEl.width, 0);
    ctx.restore();

    // Resize to max 480px wide for storage efficiency
    const out = document.createElement("canvas");
    const W   = Math.min(480, canvasEl.width);
    const H   = Math.round((W / canvasEl.width) * canvasEl.height);
    out.width  = W;
    out.height = H;
    const outCtx = out.getContext("2d", { willReadFrequently: true });
    outCtx.drawImage(canvasEl, 0, 0, W, H);

    // Vintage B&W: desaturate + contrast boost + 20% grain noise
    try {
      const imgData = outCtx.getImageData(0, 0, W, H);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
        const c    = (gray - 128) * 1.15 + 128;
        const noise = (Math.random() - 0.5) * 0.4 * 255;
        const v    = Math.max(0, Math.min(255, c + noise));
        d[i] = d[i+1] = d[i+2] = v;
      }
      outCtx.putImageData(imgData, 0, 0);
    } catch(err) {
      console.error("B&W filter failed:", err);
    }

    capturedUrl = out.toDataURL("image/jpeg", 0.75);

    previewImg.src       = capturedUrl;
    postText.value       = "";
    charLeft.textContent = "140";
    modalBg.classList.add("open");
  });

  /* ============================================================
   * MODAL
   * ============================================================ */
  postText.addEventListener("input", () => {
    charLeft.textContent = 140 - postText.value.length;
  });

  cancelBtn.addEventListener("click", closeModal);
  modalBg.addEventListener("click", e => { if (e.target === modalBg) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  function closeModal() {
    modalBg.classList.remove("open");
    capturedUrl = null;
  }

  shareBtn.addEventListener("click", async () => {
    if (!capturedUrl) return;

    const text = postText.value.trim() || "😄";
    let post = {
      id:         Date.now().toString(),
      image:      capturedUrl,
      text,
      created_at: new Date().toISOString()
    };

    shareBtn.disabled    = true;
    shareBtn.textContent = "SHARING…";

    try {
      if (USE_SUPABASE) {
        const imageUrl = await supabaseUploadImage(capturedUrl);
        post = await supabaseInsert({
          image_url: imageUrl,
          text
        });
      } else {
        localSave(post);
      }
      prependCard(post);
      closeModal();
      showToast("아름다운 웃음을 가졌구나...");
    } catch (err) {
      console.error(err);
      showToast("공유 실패. 다시 시도해 주세요!");
    } finally {
      shareBtn.disabled    = false;
      shareBtn.textContent = "SHARE";
    }
  });

  /* ============================================================
   * LOCAL STORAGE
   * ============================================================ */
  function localSave(post) {
    const all = localAll();
    all.unshift(post);
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(all.slice(0, MAX_LOCAL)));
    } catch {
      // Storage quota exceeded — keep only the 20 newest
      localStorage.setItem(LS_KEY, JSON.stringify(all.slice(0, 20)));
    }
  }

  function removeFromStorage(postId) {
    const filtered = localAll().filter(p => String(p.id) !== String(postId));
    localStorage.setItem(LS_KEY, JSON.stringify(filtered));
  }

  function localAll() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); }
    catch { return []; }
  }

  /* ============================================================
   * SUPABASE (optional — loaded dynamically)
   * ============================================================ */
  async function initSupabase() {
    await new Promise((res, rej) => {
      const s   = document.createElement("script");
      s.src     = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
      s.onload  = res;
      s.onerror = rej;
      document.head.appendChild(s);
    });
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  function dataUrlToBlob(dataUrl) {
    const [meta, base64] = dataUrl.split(",");
    const mime = meta.match(/:(.*?);/)?.[1] || "image/jpeg";
    const bin = atob(base64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i += 1) bytes[i] = bin.charCodeAt(i);
    return new Blob([bytes], { type: mime });
  }

  async function supabaseUploadImage(dataUrl) {
    if (!sbClient) throw new Error("Supabase not initialised");

    const blob = dataUrlToBlob(dataUrl);
    const id = crypto.randomUUID?.() || `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    const filePath = `public/${id}.jpg`;
    const { error } = await sbClient.storage
      .from(STORAGE_BUCKET)
      .upload(filePath, blob, {
        contentType: "image/jpeg",
        cacheControl: "31536000",
        upsert: false
      });

    if (error) throw error;

    const { data } = sbClient.storage
      .from(STORAGE_BUCKET)
      .getPublicUrl(filePath);

    return data.publicUrl;
  }

  async function supabaseInsert(post) {
    if (!sbClient) throw new Error("Supabase not initialised");
    const { data, error } = await sbClient
      .from("posts")
      .insert({
        image_url: post.image_url,
        text: post.text
      })
      .select("id,image_url,text,created_at")
      .single();
    if (error) throw error;
    return normalizePost(data);
  }

  async function supabaseFetchAll() {
    if (!sbClient) throw new Error("Supabase not initialised");
    const { data, error } = await sbClient
      .from("posts")
      .select("id,image_url,text,created_at")
      .order("created_at", { ascending: false })
      .limit(100);
    if (error) throw error;
    return data.map(normalizePost);
  }

  function normalizePost(post) {
    return {
      id: post.id,
      image: post.image_url || post.image,
      text: post.text,
      created_at: post.created_at
    };
  }

  /* ============================================================
   * FEED
   * ============================================================ */
  async function loadFeed() {
    try {
      const posts = USE_SUPABASE ? await supabaseFetchAll() : localAll();
      pileStage.innerHTML = "";
      if (!posts.length) {
        renderPileEmpty();
        return;
      }
      [...posts].reverse().forEach((p, i) => {
        const card = makeCard(p, i + 1);
        pileStage.appendChild(card);
      });
      layoutPile(true);
      zCounter = posts.length + 1;
    } catch (e) {
      console.error(e);
    }
  }


  function prependCard(post) {
    pileStage.querySelector(".pile-empty")?.remove();
    const card = makeCard(post, ++zCounter);
    pileStage.appendChild(card);
    layoutPile(true);
  }

  function renderPileEmpty() {
    pileStage.style.minHeight = `${Math.max(240, window.innerHeight)}px`;
    pileStage.innerHTML = `<div class="pile-empty">NO SMILES YET<br>TAKE THE FIRST ONE</div>`;
  }

  /* ============================================================
   * PILE LAYOUT
   * ============================================================ */
  const CARD_W   = 168;
  const CARD_H   = 168;
  const ROW_GAP  = 26;
  const EDGE_PAD = 18;
  const PILE_Y_JITTER = 14;

  function cardSize() {
    const w = Math.min(CARD_W, Math.max(120, pileStage.clientWidth - EDGE_PAD * 2));
    return { w, h: w };
  }

  function randomBetween(min, max) {
    return min + Math.random() * Math.max(0, max - min);
  }

  function pileTopLimit() {
    const webcam = document.querySelector(".webcam-wrap");
    if (!webcam) return EDGE_PAD;
    return Math.max(EDGE_PAD, webcam.getBoundingClientRect().top + window.scrollY + 12);
  }

  function layoutPile(animate = false) {
    const cards = [...pileStage.querySelectorAll(".post-card")];
    const stageW = pileStage.clientWidth;
    const size = cardSize();
    const minX = EDGE_PAD;
    const maxX = Math.max(minX, stageW - size.w - EDGE_PAD);
    const columnGap = 22;
    const rowStep = size.h + ROW_GAP;
    const columns = Math.max(1, Math.floor((stageW - EDGE_PAD * 2 + columnGap) / (size.w + columnGap)));
    const cellW = columns === 1 ? 0 : (maxX - minX) / (columns - 1);
    const movableCards = cards.filter(card => card.dataset.dragged !== "true");
    const rowCount = Math.max(1, Math.ceil(movableCards.length / columns));
    const pileHeight = EDGE_PAD * 2 + rowCount * size.h + Math.max(0, rowCount - 1) * ROW_GAP;
    const topLimit = pileTopLimit();
    const captureH = document.querySelector(".capture-section")?.offsetHeight || 0;
    const draggedMaxBottom = cards.reduce((max, card) => {
      if (card.dataset.dragged !== "true") return max;
      const draggedY = parseFloat(card.style.top || card.dataset.y || "0");
      return Math.max(max, draggedY + size.h + EDGE_PAD);
    }, 0);
    const bottomStackHeight = topLimit + EDGE_PAD + size.h + Math.max(0, rowCount - 1) * rowStep + PILE_Y_JITTER;
    const stageHeight = Math.max(window.innerHeight, captureH, pileHeight, draggedMaxBottom, bottomStackHeight);

    pileStage.style.minHeight = `${stageHeight}px`;
    document.body.style.minHeight = `${stageHeight}px`;

    let placed = 0;
    let maxBottom = 0;

    cards.forEach((card, i) => {
      if (card.dataset.dragged === "true") {
        const draggedY = parseFloat(card.style.top || card.dataset.y || "0");
        maxBottom = Math.max(maxBottom, draggedY + size.h);
        return;
      }

      const row = Math.floor(placed / columns);
      const col = placed % columns;
      const baseX = columns === 1 ? minX : minX + col * cellW;
      const xJitter = columns === 1 ? 0 : randomBetween(-cellW * 0.12, cellW * 0.12);
      const yJitter = randomBetween(0, PILE_Y_JITTER);
      const x = Math.min(maxX, Math.max(minX, baseX + xJitter));
      const y = Math.max(topLimit, stageHeight - EDGE_PAD - size.h - row * rowStep - yJitter);
      placed += 1;

      card.style.left = `${x.toFixed(1)}px`;
      card.style.top = `${y.toFixed(1)}px`;
      card.dataset.x = x.toFixed(1);
      card.dataset.y = y.toFixed(1);
      maxBottom = Math.max(maxBottom, y + size.h);
      if (animate && card.dataset.dropped !== "true") {
        card.style.setProperty("--drop-distance", `calc(-100vh - ${y + size.h}px)`);
        card.style.animationDelay = `${Math.min(i * 0.09, 0.9)}s`;
        card.classList.remove("drop-in");
        void card.offsetWidth;
        card.classList.add("drop-in");
        card.dataset.dropped = "true";
      }
    });

    const finalStageHeight = Math.max(stageHeight, maxBottom + EDGE_PAD);
    pileStage.style.minHeight = `${finalStageHeight}px`;
    document.body.style.minHeight = `${finalStageHeight}px`;
    clampCardsToStage();
    syncCardStackOrder();
  }

  function clampCardsToStage() {
    const size = cardSize();
    const minY = pileTopLimit();
    const maxX = Math.max(0, pileStage.clientWidth - size.w);
    const maxY = Math.max(minY, pileStage.clientHeight - size.h);

    pileStage.querySelectorAll(".post-card").forEach(card => {
      const x = Math.min(maxX, Math.max(0, parseFloat(card.style.left || "0")));
      const y = Math.min(maxY, Math.max(minY, parseFloat(card.style.top || "0")));
      card.style.left = `${x.toFixed(1)}px`;
      card.style.top = `${y.toFixed(1)}px`;
      card.dataset.x = x.toFixed(1);
      card.dataset.y = y.toFixed(1);
    });
  }

  function syncCardStackOrder() {
    const cards = [...pileStage.querySelectorAll(".post-card")];
    cards.forEach((card, i) => {
      card.style.zIndex = String(i + 1);
    });
    zCounter = cards.length + 1;
  }

  function makeCard(post, z) {
    const card = document.createElement("div");
    card.className = "post-card";

    const rot  = (Math.random() - 0.5) * 16;
    const safeZ = Math.min(z, 8000);
    card.style.cssText = `left:0px;top:-300px;z-index:${safeZ};--rot:${rot.toFixed(1)}deg;transform:rotate(${rot.toFixed(1)}deg);`;

    const d  = new Date(post.created_at || Date.now());
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const yy = d.getFullYear();
    const hh = d.getHours();
    const min = String(d.getMinutes()).padStart(2, "0");
    const ampm = hh >= 12 ? "PM" : "AM";
    const hh12 = String(hh % 12 || 12).padStart(2, "0");
    const timeStr = `${mm}.${dd}.${yy} ${ampm} ${hh12}.${min}`;

    card.innerHTML = `
      <img src="${post.image}" alt="Smile post" loading="lazy" draggable="false" />
      <div class="post-body">
        <p class="post-text">${escHtml(post.text)}</p>
        <span class="post-meta">${timeStr}</span>
      </div>
      <button class="delete-btn" title="삭제">✕</button>
    `;

    const delBtn = card.querySelector(".delete-btn");
    delBtn.addEventListener("click", e => {
      e.stopPropagation();
      e.preventDefault();
      openPwModal(card, post);
    });

    card.addEventListener("mousedown",  e => { if (!e.target.closest(".delete-btn")) startDrag(e, card); });
    card.addEventListener("touchstart", e => { if (!e.target.closest(".delete-btn")) startDrag(e, card); }, { passive: false });
    card.addEventListener("animationend", e => {
      if (e.animationName === "cardDrop") {
        card.classList.remove("drop-in");
        card.style.animationDelay = "0s";
        card.style.transform = `rotate(${card.style.getPropertyValue("--rot")})`;
      }
    });

    return card;
  }

  /* ============================================================
   * DRAG
   * ============================================================ */
  function startDrag(e, card) {
    e.preventDefault();
    dragEl = card;
    card.dataset.dragged = "true";
    card.style.zIndex = ++zCounter;

    const rot = card.style.getPropertyValue("--rot");
    card.classList.remove("drop-in");
    card.style.animationDelay = "0s";
    card.style.transform = `rotate(${rot}) scale(1.05)`;
    card.style.filter    = "drop-shadow(0 16px 24px rgba(0,0,0,0.5))";
    card.style.cursor    = "grabbing";

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const stageRect = pileStage.getBoundingClientRect();
    dragOX = clientX - stageRect.left - parseFloat(card.style.left || "0");
    dragOY = clientY - stageRect.top - parseFloat(card.style.top || "0");
  }

  function onDragMove(e) {
    if (!dragEl) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const stageRect = pileStage.getBoundingClientRect();
    const size = cardSize();
    const minY = pileTopLimit();
    const maxX = Math.max(0, pileStage.clientWidth - size.w);
    const maxY = Math.max(minY, pileStage.clientHeight - size.h);
    const nx = Math.min(maxX, Math.max(0, clientX - stageRect.left - dragOX));
    const ny = Math.min(maxY, Math.max(minY, clientY - stageRect.top - dragOY));
    dragEl.style.left = nx + "px";
    dragEl.style.top  = ny + "px";
    dragEl.dataset.x = nx.toFixed(1);
    dragEl.dataset.y = ny.toFixed(1);
  }

  function onDragEnd() {
    if (!dragEl) return;
    const rot = dragEl.style.getPropertyValue("--rot");
    dragEl.style.transform = `rotate(${rot})`;
    dragEl.style.filter    = "none";
    dragEl.style.cursor    = "grab";
    dragEl = null;
    syncCardStackOrder();
  }

  document.addEventListener("mousemove",  onDragMove);
  document.addEventListener("mouseup",    onDragEnd);
  document.addEventListener("touchmove",  onDragMove, { passive: false });
  document.addEventListener("touchend",   onDragEnd);
  window.addEventListener("resize", () => {
    layoutPile();
  });

  function escHtml(s) {
    return s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  /* ============================================================
   * TOAST
   * ============================================================ */
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3000);
  }

  /* ============================================================
   * BOOT
   * ============================================================ */
  async function boot() {
    startWebcam();
    if (USE_SUPABASE) {
      try { await initSupabase(); }
      catch (e) { console.warn("Supabase load failed:", e); }
    }
    loadFeed();
  }

  boot();
</script>

</body>
