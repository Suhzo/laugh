<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMILE &amp; SHARE — 웃어라, 세상이 너와 함께 웃을 것이다</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;700;900&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:  #0D0D0D;
      --white:  #F5F5EC;   /* polaroid card white */
      --yellow: #FFE500;
      --red:    #FF2222;
      --blue:   #3D6FFF;
      --green:  #00D44B;
      /* dark mode palette */
      --bg:     #111111;
      --fg:     #F0F0E4;
      --border: 3px solid var(--black);      /* polaroid/card borders */
      --border-ui: 3px solid var(--fg);      /* UI borders on dark bg */
      --sh-sm:  3px 3px 0 var(--black);
      --sh-md:  5px 5px 0 var(--black);
      --sh-lg:  8px 8px 0 var(--black);
      --sh-ui-sm: 3px 3px 0 var(--fg);
      --sh-ui-md: 5px 5px 0 var(--fg);
      --sh-ui-lg: 8px 8px 0 var(--fg);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      color: var(--fg);
      min-height: 100vh;
    }

    /* ===== CAPTURE SECTION ===== */
    .capture-section {
      position: relative;
      z-index: 9000;
      padding: 56px 20px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .webcam-wrap  { position: relative; z-index: 9010; }
    .meter-wrap   { position: relative; z-index: 9010; }
    #captureBtn   { position: relative; z-index: 9010; }

    .section-heading {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.8rem, 7vw, 5rem);
      letter-spacing: 6px;
      text-align: center;
      line-height: 1;
      margin-bottom: 6px;
    }

    .section-sub {
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.45;
      margin-bottom: 36px;
      text-align: center;
    }

    /* Camera */
    .webcam-wrap {
      position: relative;
      width: min(480px, 100%);
      background: #111;
      overflow: hidden;
    }

    #webcam {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas { display: none; }

    .flash-layer {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.06s;
    }
    .flash-layer.pop { opacity: 1; }

    /* Smile badge */
    .smile-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 5px 12px;
      border: none;
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: var(--red);
      color: #fff;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .smile-badge.on {
      background: var(--green);
      color: var(--black);
    }

    /* Meter */
    .meter-wrap {
      width: min(480px, 100%);
      margin-top: 12px;
    }

    .meter-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.62rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .meter-track {
      height: 22px;
      background: #2a2a2a;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--red);
      transition: width 0.08s linear, background 0.15s;
    }
    .meter-fill.on { background: var(--green); }

    /* Capture button */
    #captureBtn {
      margin-top: 28px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #555;
      color: #fff;
      border: none;
      box-shadow: none;
      cursor: pointer;
      transition: transform 0.08s, background 0.15s;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #captureBtn:disabled {
      background: #2a2a2a;
      color: #444;
      cursor: not-allowed;
    }

    #captureBtn:not(:disabled):hover {
      transform: translate(-3px, -3px);
    }

    #captureBtn:not(:disabled):active {
      transform: translate(3px, 3px);
    }


    /* ===== MODAL ===== */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-bg.open { display: flex; }

    .modal-box {
      background: #1a1a1a;
      border: var(--border-ui);
      box-shadow: none;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    #previewImg {
      width: 100%;
      display: block;
      border: var(--border-ui);
      margin-bottom: 16px;
    }

    #postText {
      width: 100%;
      padding: 14px;
      font-family: 'Space Grotesk', 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: var(--border-ui);
      box-shadow: none;
      background: #0f0f0f;
      color: var(--fg);
      resize: vertical;
      min-height: 88px;
      outline: none;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    #postText:focus { outline: 3px solid var(--blue); }
    #postText::placeholder { font-weight: 500; opacity: 0.45; }

    .char-row {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      text-align: right;
      margin-bottom: 16px;
    }

    .modal-actions { display: flex; gap: 12px; }

    #shareBtn {
      flex: 1;
      padding: 14px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.6rem;
      letter-spacing: 3px;
      background: #c8c8c8;
      color: #333;
      border: none;
      box-shadow: none;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
    }
    #shareBtn:hover:not(:disabled) { background: #b0b0b0; }
    #shareBtn:active:not(:disabled) { background: #a0a0a0; }
    #shareBtn:disabled { opacity: 0.55; cursor: not-allowed; }

    #cancelBtn {
      padding: 14px 18px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.6rem;
      letter-spacing: 3px;
      background: transparent;
      color: var(--fg);
      border: var(--border-ui);
      box-shadow: none;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    #cancelBtn:hover { background: var(--red); color: #fff; }

    /* ===== FEED ===== */


    /* Card */
    .post-card {
      position: fixed;
      width: 210px;
      background: transparent;
      padding: 0;
      border: none;
      box-shadow: none;
      cursor: grab;
      user-select: none;
      touch-action: none;
      pointer-events: all;
      overflow: hidden;
      will-change: left, top;
      transition: filter 0.15s ease;
    }

    .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: bold;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 0;
      transition: color 0.15s;
    }
    .delete-btn:hover { color: rgba(255,80,80,0.95); }

    #pwModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99999;
      align-items: center;
      justify-content: center;
    }
    #pwModal.open { display: flex; }
    #pwModal .pw-box {
      background: #1a1a1a;
      border: 1px solid #444;
      padding: 24px 20px 20px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 240px;
    }
    #pwModal .pw-box p {
      color: #eee;
      font-size: 13px;
      margin: 0;
      text-align: center;
    }
    #pwModal input {
      background: #2a2a2a;
      border: 1px solid #555;
      color: #fff;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }
    #pwModal .pw-actions {
      display: flex;
      gap: 8px;
    }
    #pwModal button {
      flex: 1;
      padding: 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    #pwModal #pwConfirm { background: #e53e3e; color: #fff; }
    #pwModal #pwCancel  { background: #333; color: #aaa; }

    .post-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      filter: grayscale(1) contrast(1.12);
    }

    .post-body {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.62));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .post-text {
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
      width: 100%;
    }

    .post-meta {
      font-size: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.55);
      margin-top: 3px;
    }

    .feed-loading {
      position: absolute;
      top: 60px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      padding: 64px;
      font-family: 'Bebas Neue', cursive;
      font-size: 1.2rem;
      letter-spacing: 3px;
      opacity: 0.28;
    }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--fg);
      color: var(--black);
      border: var(--border-ui);
      box-shadow: var(--sh-ui-md);
      padding: 12px 26px;
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      z-index: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px) {

      .capture-section { padding: 32px 16px; }
      .feed-section { padding: 32px 16px 72px; }
      #captureBtn { font-size: 1.6rem; padding: 16px 32px; }
    }
  </style>
</head>
<body>

<!-- ===== CAPTURE SECTION ===== -->
<section class="capture-section">
  <h1 class="section-heading">Laugh,<br>and the world laughs with you</h1>
  <p class="section-sub">Weep, and you weep alone.<br>— Ella Wheeler Wilcox, "Solitude"</p>

  <div class="webcam-wrap">
    <video id="webcam" autoplay playsinline muted></video>
    <div class="flash-layer" id="flashLayer"></div>
    <div class="smile-badge" id="smileBadge">● NOT SMILING</div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="meter-wrap">
    <div class="meter-row">
      <span>SMILE METER</span>
      <span id="smilePct">0%</span>
    </div>
    <div class="meter-track">
      <div class="meter-fill" id="meterFill"></div>
    </div>
  </div>

  <button id="captureBtn" disabled>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </button>
</section>

<!-- ===== MODAL ===== -->
<div class="modal-bg" id="modalBg">
  <div class="modal-box">
    <p class="modal-title">I like your smile..</p>
    <img id="previewImg" alt="Your captured smile" />
    <textarea
      id="postText"
      placeholder="행복해서 웃는게 아니라 웃어서 행복한거야..."
      maxlength="140"
    ></textarea>
    <p class="char-row"><span id="charLeft">140</span> chars left</p>
    <div class="modal-actions">
      <button id="shareBtn">SHARE IT →</button>
      <button id="cancelBtn">CANCEL</button>
    </div>
  </div>
</div>

<div id="pwModal">
  <div class="pw-box">
    <p>🔐 비밀번호를 입력하세요</p>
    <input id="pwInput" type="password" placeholder="비밀번호" />
    <div class="pw-actions">
      <button id="pwConfirm">삭제</button>
      <button id="pwCancel">취소</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast"></div>

<!-- ===== SCRIPT ===== -->
<script type="module">
  /* ============================================================
   * CONFIGURATION
   *
   * To enable cross-device sharing via Supabase:
   *   1. Create a Supabase project at https://supabase.com
   *   2. Run this SQL to create the posts table:
   *        create table posts (
   *          id uuid default uuid_generate_v4() primary key,
   *          image text not null,
   *          text  text not null,
   *          created_at timestamptz default now()
   *        );
   *        alter table posts enable row level security;
   *        create policy "anyone can read"  on posts for select using (true);
   *        create policy "anyone can write" on posts for insert with check (true);
   *   3. Fill in your Project URL and anon key below.
   *
   * Leave both empty → single-browser mode (localStorage).
   * ============================================================ */
  const SUPABASE_URL      = "";
  const SUPABASE_ANON_KEY = "";

  /* ============================================================
   * MEDIAPIPE IMPORT (CDN)
   * ============================================================ */
  import { FaceLandmarker, FilesetResolver }
    from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

  /* ============================================================
   * CONSTANTS
   * ============================================================ */
  const SMILE_THRESHOLD = 0.42; // avg of mouthSmileLeft + mouthSmileRight
  const LS_KEY          = "smile_share_v1";
  const MAX_LOCAL       = 50;
  const USE_SUPABASE    = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

  /* ============================================================
   * DOM REFS
   * ============================================================ */
  const webcamEl    = document.getElementById("webcam");
  const canvasEl    = document.getElementById("canvas");
  const captureBtn  = document.getElementById("captureBtn");
  const smileBadge  = document.getElementById("smileBadge");
  const meterFill   = document.getElementById("meterFill");
  const smilePct    = document.getElementById("smilePct");
  const flashLayer  = document.getElementById("flashLayer");
  const modalBg     = document.getElementById("modalBg");
  const previewImg  = document.getElementById("previewImg");
  const postText    = document.getElementById("postText");
  const charLeft    = document.getElementById("charLeft");
  const shareBtn    = document.getElementById("shareBtn");
  const cancelBtn   = document.getElementById("cancelBtn");
  const toastEl     = document.getElementById("toast");
  const pwModal     = document.getElementById("pwModal");
  const pwInput     = document.getElementById("pwInput");
  const pwConfirm   = document.getElementById("pwConfirm");
  const pwCancel    = document.getElementById("pwCancel");

  let pendingCard = null;
  let pendingPost = null;

  function openPwModal(card, post) {
    pendingCard = card;
    pendingPost = post;
    pwInput.value = "";
    pwModal.classList.add("open");
    setTimeout(() => pwInput.focus(), 50);
  }
  function closePwModal() {
    pwModal.classList.remove("open");
    pendingCard = null;
    pendingPost = null;
  }
  function confirmDelete() {
    if (!pendingCard) return;
    if (pwInput.value === "서현이최고") {
      pendingCard.style.transition = "opacity 0.25s";
      pendingCard.style.opacity = "0";
      const c = pendingCard, p = pendingPost;
      setTimeout(() => c.remove(), 250);
      removeFromStorage(p.id);
      closePwModal();
    } else {
      pwInput.value = "";
      pwInput.placeholder = "틀렸습니다. 다시 입력";
      pwInput.focus();
    }
  }
  pwConfirm.addEventListener("click", confirmDelete);
  pwCancel.addEventListener("click", closePwModal);
  pwInput.addEventListener("keydown", e => {
    if (e.key === "Enter")  confirmDelete();
    if (e.key === "Escape") closePwModal();
  });

  /* ============================================================
   * STATE
   * ============================================================ */
  let faceLandmarker = null;
  let smileScore     = 0;
  let isSmiling      = false;
  let capturedUrl    = null;
  let lastVideoTime  = -1;
  let toastTimer     = null;
  let sbClient       = null;
  let zCounter       = 1;

  /* Drag state */
  let dragEl = null, dragOX = 0, dragOY = 0;

  /* ============================================================
   * WEBCAM
   * ============================================================ */
  async function startWebcam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }
      });
      webcamEl.srcObject = stream;
      await new Promise(res => { webcamEl.onloadedmetadata = res; });
      webcamEl.play();
      initMediaPipe();
    } catch (e) {
      console.error("Webcam:", e);
    }
  }

  /* ============================================================
   * MEDIAPIPE
   * ============================================================ */
  async function initMediaPipe() {
    try {
      const resolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
      );
      faceLandmarker = await FaceLandmarker.createFromOptions(resolver, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        outputFaceBlendshapes: true,
        runningMode: "VIDEO",
        numFaces: 1
      });
      requestAnimationFrame(detectLoop);
    } catch (e) {
      console.error("MediaPipe:", e);
    }
  }

  /* ============================================================
   * DETECTION LOOP
   * ============================================================ */
  function detectLoop() {
    if (faceLandmarker && !webcamEl.paused && webcamEl.readyState >= 2) {
      const now = performance.now();
      if (webcamEl.currentTime !== lastVideoTime) {
        lastVideoTime = webcamEl.currentTime;
        const result = faceLandmarker.detectForVideo(webcamEl, now);
        processBlendshapes(result);
      }
    }
    requestAnimationFrame(detectLoop);
  }

  function processBlendshapes(result) {
    if (result.faceBlendshapes?.length) {
      const cats = result.faceBlendshapes[0].categories;
      const L = cats.find(c => c.categoryName === "mouthSmileLeft")?.score  ?? 0;
      const R = cats.find(c => c.categoryName === "mouthSmileRight")?.score ?? 0;
      smileScore = (L + R) / 2;
    } else {
      smileScore = 0;
    }
    updateSmileUI();
  }

  function updateSmileUI() {
    const pct = Math.round(smileScore * 100);
    meterFill.style.width = pct + "%";
    smilePct.textContent  = pct + "%";
    isSmiling = smileScore >= SMILE_THRESHOLD;

    if (isSmiling) {
      meterFill.classList.add("on");
      smileBadge.classList.add("on");
      smileBadge.textContent   = "● SMILING!";
      captureBtn.disabled      = false;
    } else {
      meterFill.classList.remove("on");
      smileBadge.classList.remove("on");
      smileBadge.textContent = "● NOT SMILING";
      captureBtn.disabled    = true;
    }
  }

  /* ============================================================
   * CAPTURE
   * ============================================================ */
  captureBtn.addEventListener("click", () => {
    if (!isSmiling) return;

    // Flash
    flashLayer.classList.add("pop");
    setTimeout(() => flashLayer.classList.remove("pop"), 160);

    // Draw to canvas (flip mirror → correct orientation)
    canvasEl.width  = webcamEl.videoWidth;
    canvasEl.height = webcamEl.videoHeight;
    const ctx = canvasEl.getContext("2d");
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(webcamEl, -canvasEl.width, 0);
    ctx.restore();

    // Resize to max 480px wide for storage efficiency
    const out = document.createElement("canvas");
    const W   = Math.min(480, canvasEl.width);
    const H   = Math.round((W / canvasEl.width) * canvasEl.height);
    out.width  = W;
    out.height = H;
    const outCtx = out.getContext("2d", { willReadFrequently: true });
    outCtx.drawImage(canvasEl, 0, 0, W, H);

    // Vintage B&W: desaturate + contrast boost + 20% grain noise
    try {
      const imgData = outCtx.getImageData(0, 0, W, H);
      const d = imgData.data;
      for (let i = 0; i < d.length; i += 4) {
        const gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
        const c    = (gray - 128) * 1.15 + 128;
        const noise = (Math.random() - 0.5) * 0.4 * 255;
        const v    = Math.max(0, Math.min(255, c + noise));
        d[i] = d[i+1] = d[i+2] = v;
      }
      outCtx.putImageData(imgData, 0, 0);
    } catch(err) {
      console.error("B&W filter failed:", err);
    }

    capturedUrl = out.toDataURL("image/jpeg", 0.75);

    previewImg.src       = capturedUrl;
    postText.value       = "";
    charLeft.textContent = "140";
    modalBg.classList.add("open");
  });

  /* ============================================================
   * MODAL
   * ============================================================ */
  postText.addEventListener("input", () => {
    charLeft.textContent = 140 - postText.value.length;
  });

  cancelBtn.addEventListener("click", closeModal);
  modalBg.addEventListener("click", e => { if (e.target === modalBg) closeModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

  function closeModal() {
    modalBg.classList.remove("open");
    capturedUrl = null;
  }

  shareBtn.addEventListener("click", async () => {
    if (!capturedUrl) return;

    const text = postText.value.trim() || "😄";
    const post = {
      id:         Date.now().toString(),
      image:      capturedUrl,
      text,
      created_at: new Date().toISOString()
    };

    shareBtn.disabled    = true;
    shareBtn.textContent = "SHARING…";

    try {
      if (USE_SUPABASE) {
        await supabaseInsert(post);
      } else {
        localSave(post);
      }
      prependCard(post);
      closeModal();
      showToast("Your smile is live! 😄");
    } catch (err) {
      console.error(err);
      showToast("공유 실패. 다시 시도해 주세요!");
    } finally {
      shareBtn.disabled    = false;
      shareBtn.textContent = "SHARE IT →";
    }
  });

  /* ============================================================
   * LOCAL STORAGE
   * ============================================================ */
  function localSave(post) {
    const all = localAll();
    all.unshift(post);
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(all.slice(0, MAX_LOCAL)));
    } catch {
      // Storage quota exceeded — keep only the 20 newest
      localStorage.setItem(LS_KEY, JSON.stringify(all.slice(0, 20)));
    }
  }

  function removeFromStorage(postId) {
    const filtered = localAll().filter(p => String(p.id) !== String(postId));
    localStorage.setItem(LS_KEY, JSON.stringify(filtered));
  }

  function localAll() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); }
    catch { return []; }
  }

  /* ============================================================
   * SUPABASE (optional — loaded dynamically)
   * ============================================================ */
  async function initSupabase() {
    await new Promise((res, rej) => {
      const s   = document.createElement("script");
      s.src     = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js";
      s.onload  = res;
      s.onerror = rej;
      document.head.appendChild(s);
    });
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  async function supabaseInsert(post) {
    if (!sbClient) throw new Error("Supabase not initialised");
    const { error } = await sbClient.from("posts").insert({
      image: post.image,
      text:  post.text
    });
    if (error) throw error;
  }

  async function supabaseFetchAll() {
    if (!sbClient) throw new Error("Supabase not initialised");
    const { data, error } = await sbClient
      .from("posts")
      .select("id,image,text,created_at")
      .order("created_at", { ascending: false })
      .limit(100);
    if (error) throw error;
    return data;
  }

  /* ============================================================
   * FEED
   * ============================================================ */
  async function loadFeed() {
    try {
      const posts = USE_SUPABASE ? await supabaseFetchAll() : localAll();
      document.querySelectorAll(".post-card").forEach(c => c.remove());
      if (!posts.length) return;
      [...posts].reverse().forEach((p, i) => {
        setTimeout(() => document.body.appendChild(makeCard(p, i + 1)), i * 350);
      });
      zCounter = posts.length + 1;
    } catch (e) {
      console.error(e);
      console.error(e);
    }
  }


  function prependCard(post) {
    document.body.appendChild(makeCard(post, ++zCounter));
  }

  /* ============================================================
   * PHYSICS ENGINE
   * ============================================================ */
  const CARD_W   = 210;
  const CARD_H   = 210;
  const GRAV     = 0.55;   // px/frame²
  const BOUNCE   = 0.10;   // restitution
  const FL_FRIC  = 0.80;   // floor friction on vx
  const SLEEP_V  = 0.30;   // sleep velocity threshold
  const SLEEP_N  = 30;     // frames below threshold before sleep
  const MAX_VY   = 24;     // terminal velocity

  const bodies = [];
  let physRaf = null;

  function bodyAdd(el, startX) {
    const b = {
      el,
      x:  Math.max(0, Math.min(window.innerWidth - CARD_W, startX)),
      y:  -CARD_H - Math.random() * 60,
      vx: (Math.random() - 0.5) * 1.2,
      vy: 0.5,
      still: 0,
      sleeping: false,
      dragging: false,
    };
    bodies.push(b);
    el.style.left    = b.x + "px";
    el.style.top     = b.y + "px";
    el.style.opacity = "1";
    if (!physRaf) physRaf = requestAnimationFrame(physTick);
    return b;
  }

  function bodyGet(el) { return bodies.find(b => b.el === el); }

  // 일반 정적 장애물 충돌 해결 (최소 침투 축)
  function resolveStatic(b, s) {
    const bR = b.x + CARD_W, bB = b.y + CARD_H;
    const sR = s.x + s.w,    sB = s.y + s.h;
    if (b.x >= sR || bR <= s.x || b.y >= sB || bB <= s.y) return;

    const dL = bR - s.x, dR = sR - b.x;
    const dT = bB - s.y, dB = sB - b.y;
    const mX = Math.min(dL, dR), mY = Math.min(dT, dB);

    if (mY <= mX) {
      if (dT < dB) { b.y -= dT; if (b.vy > 0) { b.vy = -b.vy * BOUNCE; b.vx *= FL_FRIC; } }
      else         { b.y += dB; if (b.vy < 0)   b.vy = -b.vy * BOUNCE; }
    } else {
      if (dL < dR) { b.x -= dL; if (b.vx > 0) b.vx = -b.vx * BOUNCE; }
      else         { b.x += dR; if (b.vx < 0) b.vx = -b.vx * BOUNCE; }
    }
  }

  // 캡처 섹션 전용: 항상 수평(좌우)으로만 밀어냄 → 위로 사라지지 않음
  function resolveCapture(b, s) {
    const bR = b.x + CARD_W, bB = b.y + CARD_H;
    const sR = s.x + s.w,    sB = s.y + s.h;
    if (b.x >= sR || bR <= s.x || b.y >= sB || bB <= s.y) return;

    const dL = bR - s.x;   // 왼쪽으로 밀 거리
    const dR = sR - b.x;   // 오른쪽으로 밀 거리

    if (dL <= dR) {
      b.x -= dL;
      b.vx = -Math.abs(b.vx) * BOUNCE - 0.5;  // 왼쪽으로 튕김
    } else {
      b.x += dR;
      b.vx =  Math.abs(b.vx) * BOUNCE + 0.5;  // 오른쪽으로 튕김
    }
  }

  function physTick() {
    physRaf = requestAnimationFrame(physTick);
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // 캡처 섹션 경계 (매 프레임 최신 위치 반영)
    let capRect = null;
    const capEl = document.querySelector(".capture-section");
    if (capEl) {
      const r = capEl.getBoundingClientRect();
      capRect = { x: r.left, y: r.top, w: r.width, h: r.height };
    }

    // Static world boundaries
    const statics = [
      { x: -200,  y: vh,    w: vw + 400, h: 200 },  // floor
      { x: -200,  y: -9999, w: 200,      h: 99999 }, // left wall
      { x: vw,    y: -9999, w: 200,      h: 99999 }, // right wall
    ];

    // Integrate active bodies
    const active = bodies.filter(b => !b.sleeping && !b.dragging);
    for (const b of active) {
      b.vy = Math.min(b.vy + GRAV, MAX_VY);
      b.x += b.vx;
      b.y += b.vy;
    }

    // Collision passes (4 iterations for stability)
    for (let pass = 0; pass < 4; pass++) {
      for (const b of active) {
        // vs 바닥·벽
        for (const s of statics) resolveStatic(b, s);
        // vs 캡처 섹션 (수평 전용)
        if (capRect) resolveCapture(b, capRect);
        // vs 다른 카드 (sleeping = 정적)
        for (const o of bodies) {
          if (o === b || o.dragging) continue;
          resolveStatic(b, { x: o.x, y: o.y, w: CARD_W, h: CARD_H });
        }
      }
    }

    // Sleep & DOM update
    for (const b of active) {
      if (Math.abs(b.vx) < SLEEP_V && Math.abs(b.vy) < SLEEP_V) {
        if (++b.still >= SLEEP_N) { b.sleeping = true; b.vx = 0; b.vy = 0; }
      } else {
        b.still = 0;
      }
      b.el.style.left = b.x.toFixed(1) + "px";
      b.el.style.top  = b.y.toFixed(1) + "px";
    }
  }
  /* --------------------------- */

  function makeCard(post, z) {
    const card = document.createElement("div");
    card.className = "post-card";

    const rot    = (Math.random() - 0.5) * 16;
    const startX = Math.random() * Math.max(0, window.innerWidth - CARD_W);
    const safeZ  = Math.min(z, 8000); // 항상 capture-section(9000) 아래
    card.style.cssText = `left:-999px;top:-999px;z-index:${safeZ};--rot:${rot.toFixed(1)}deg;transform:rotate(${rot.toFixed(1)}deg);opacity:0;`;

    const d  = new Date(post.created_at || Date.now());
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const yy = d.getFullYear();
    const hh = d.getHours();
    const min = String(d.getMinutes()).padStart(2, "0");
    const ampm = hh >= 12 ? "PM" : "AM";
    const hh12 = String(hh % 12 || 12).padStart(2, "0");
    const timeStr = `${mm}.${dd}.${yy} ${ampm} ${hh12}.${min}`;

    card.innerHTML = `
      <img src="${post.image}" alt="Smile post" loading="lazy" draggable="false" />
      <div class="post-body">
        <p class="post-text">${escHtml(post.text)}</p>
        <span class="post-meta">${timeStr}</span>
      </div>
      <button class="delete-btn" title="삭제">✕</button>
    `;

    const delBtn = card.querySelector(".delete-btn");
    delBtn.addEventListener("click", e => {
      e.stopPropagation();
      e.preventDefault();
      openPwModal(card, post);
    });

    card.addEventListener("mousedown",  e => { if (!e.target.closest(".delete-btn")) startDrag(e, card); });
    card.addEventListener("touchstart", e => { if (!e.target.closest(".delete-btn")) startDrag(e, card); }, { passive: false });

    // Spawn physics body after appended to DOM (caller appends then physics runs)
    requestAnimationFrame(() => bodyAdd(card, startX));
    return card;
  }

  /* ============================================================
   * DRAG
   * ============================================================ */
  function startDrag(e, card) {
    e.preventDefault();
    dragEl = card;
    card.style.zIndex = ++zCounter;

    const b = bodyGet(card);
    if (b) { b.dragging = true; b.sleeping = false; b.vx = 0; b.vy = 0; }

    const rot = card.style.getPropertyValue("--rot");
    card.style.transform = `rotate(${rot}) scale(1.05)`;
    card.style.filter    = "drop-shadow(0 16px 24px rgba(0,0,0,0.5))";
    card.style.cursor    = "grabbing";

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    dragOX = clientX - parseFloat(card.style.left);
    dragOY = clientY - parseFloat(card.style.top);
  }

  let prevDragX = 0, prevDragY = 0;
  function onDragMove(e) {
    if (!dragEl) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const nx = clientX - dragOX;
    const ny = clientY - dragOY;
    const b  = bodyGet(dragEl);
    if (b) { b.x = nx; b.y = ny; }
    dragEl.style.left = nx + "px";
    dragEl.style.top  = ny + "px";
    prevDragX = clientX;
    prevDragY = clientY;
  }

  function onDragEnd() {
    if (!dragEl) return;
    const b = bodyGet(dragEl);
    if (b) {
      b.dragging = false;
      b.sleeping = false;
      b.still    = 0;
      // Give it a small drop velocity so it falls naturally
      b.vy = 2;
      b.vx = 0;
    }
    const rot = dragEl.style.getPropertyValue("--rot");
    dragEl.style.transform = `rotate(${rot})`;
    dragEl.style.filter    = "none";
    dragEl.style.cursor    = "grab";
    dragEl = null;
  }

  document.addEventListener("mousemove",  onDragMove);
  document.addEventListener("mouseup",    onDragEnd);
  document.addEventListener("touchmove",  onDragMove, { passive: false });
  document.addEventListener("touchend",   onDragEnd);

  function escHtml(s) {
    return s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  /* ============================================================
   * TOAST
   * ============================================================ */
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3500);
  }

  /* ============================================================
   * BOOT
   * ============================================================ */
  async function boot() {
    startWebcam();
    if (USE_SUPABASE) {
      try { await initSupabase(); }
      catch (e) { console.warn("Supabase load failed:", e); }
    }
    loadFeed();
  }

  boot();
</script>

</body>
</html>
